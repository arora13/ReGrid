version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: regrid-postgis
    environment:
      POSTGRES_DB: regrid
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - regrid_pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
    container_name: regrid-spatial-api
    depends_on:
      - db
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/regrid
    ports:
      - "8000:8000"

volumes:
  regrid_pgdata:
